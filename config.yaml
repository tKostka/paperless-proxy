name: "Paperless-NGX Proxy"
version: "1.5.0"
slug: "paperless_proxy"
description: >-
  Reverse Proxy for Paperless-NGX — exposes a self-hosted Paperless-NGX
  instance inside Home Assistant via Ingress, including Nabu Casa remote access.
  No additional port forwarding or VPN required.
url: "https://github.com/tKostka/paperless-proxy"
arch:
  - aarch64
  - amd64
  - armv7
startup: application
boot: auto
init: false
ingress: true
ingress_port: 8099
panel_icon: "mdi:file-document-multiple"
panel_title: "Paperless"
homeassistant_api: false
hassio_api: true
host_network: true
options:
  paperless_url: ""
schema:
  paperless_url: url
build_from:
  aarch64: "ghcr.io/home-assistant/aarch64-base:latest"
  amd64: "ghcr.io/home-assistant/amd64-base:latest"
  armv7: "ghcr.io/home-assistant/armv7-base:latest"
